name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      test: ${{ steps.filter.outputs.test }}
      haskell: ${{ steps.filter.outputs.haskell }}
      markdown_bridge: ${{ steps.filter.outputs.markdown_bridge }}
      parser_sync_policy: ${{ steps.filter.outputs.parser_sync_policy }}
      parser_benchmark: ${{ steps.filter.outputs.parser_benchmark }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ github.token }}
          base: ${{ github.base_ref || github.ref_name || 'main' }}
          filters: |
            lint:
              - ".github/workflows/ci.yml"
              - ".github/actions/**"
              - "Justfile"
              - ".topiary.toml"
              - "dune"
              - "dune-project"
              - "*.opam"
              - "scripts/**"
              - "bin/**"
              - "lib/**"
              - "test/**"
              - "tools/rust-parser/**"
            test:
              - ".github/workflows/ci.yml"
              - ".github/actions/**"
              - "Justfile"
              - "dune"
              - "dune-project"
              - "*.opam"
              - "scripts/**"
              - "bin/**"
              - "lib/**"
              - "test/**"
              - "tools/rust-parser/**"
            haskell:
              - ".github/workflows/ci.yml"
              - ".github/actions/**"
              - "Justfile"
              - "scripts/test-markdown-converter.sh"
              - "lib/compiler/Dir_scanner.ml"
              - "lib/compiler/Parse.ml"
              - "tools/pandoc-converter/**"
            markdown_bridge:
              - ".github/workflows/ci.yml"
              - ".github/actions/**"
              - "Justfile"
              - "scripts/test-markdown-converter.sh"
              - "scripts/test-markdown-bridge-ocaml.sh"
              - "lib/compiler/Parse.ml"
              - "lib/compiler/test/Test_markdown_conversion.ml"
              - "lib/compiler/test/Test_markdown_fixture_conversion.ml"
              - "lib/compiler/test/dune"
              - "tools/pandoc-converter/**"
            parser_sync_policy:
              - ".github/workflows/ci.yml"
              - "scripts/check-parser-sync.sh"
              - "scripts/test-parser-sync-policy.sh"
              - "docs/rust-parser/**"
              - "lib/parser/**"
              - "tools/rust-parser/**"
            parser_benchmark:
              - ".github/workflows/ci.yml"
              - "Justfile"
              - "scripts/benchmark-parser-performance.sh"
              - "lib/parser/**"
              - "tools/rust-parser/**"

  parser-sync-policy:
    needs: changes
    if: needs.changes.outputs.parser_sync_policy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate parser-sync policy checker
        run: ./scripts/test-parser-sync-policy.sh

      - name: Enforce OCaml/Rust parser drift policy
        env:
          FORESTER_PARSER_SYNC_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
          FORESTER_PARSER_SYNC_HEAD_REF: ${{ github.sha }}
        run: ./scripts/check-parser-sync.sh

  parser-benchmark:
    needs: changes
    if: needs.changes.outputs.parser_benchmark == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up shared CI toolchain
        uses: ./.github/actions/setup-ci

      - name: Benchmark Rust parser against OCaml parser
        run: ./scripts/benchmark-parser-performance.sh --output rust-parser-benchmarks.json --fail-on-regression

      - name: Upload parser benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-parser-benchmarks
          path: rust-parser-benchmarks.json

  license:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install reuse
        run: |
          python -m pip install --user reuse
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate SPDX and REUSE metadata
        run: just lint-licenses

  lint:
    needs: changes
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up shared CI toolchain
        uses: ./.github/actions/setup-ci
        with:
          rust-components: clippy,rustfmt
          install-topiary: "true"
          install-cargo-deny: "true"

      - name: Run format and lint checks
        run: |
          just fmt-check
          just lint

  haskell-converter:
    needs: changes
    if: needs.changes.outputs.haskell == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up shared Haskell CI toolchain
        uses: ./.github/actions/setup-haskell-ci

      - name: Build and test the converter scaffold
        run: just test-haskell

  markdown-bridge:
    needs: changes
    if: needs.changes.outputs.markdown_bridge == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up shared CI toolchain
        uses: ./.github/actions/setup-ci

      - name: Set up shared Haskell CI toolchain
        uses: ./.github/actions/setup-haskell-ci

      - name: Build converter binary for OCaml integration tests
        id: converter
        working-directory: tools/pandoc-converter
        run: |
          cabal --project-file=cabal.project build forester-pandoc:exe:forester-pandoc
          echo "path=$(cabal --project-file=cabal.project list-bin forester-pandoc:exe:forester-pandoc)" >> "$GITHUB_OUTPUT"

      - name: Build Rust parser binary for parity checks
        run: cargo build --manifest-path tools/rust-parser/Cargo.toml --release

      - name: Run Haskell converter tests
        run: just test-haskell

      - name: Benchmark Markdown bridge converter
        run: just benchmark-markdown-bridge

      - name: Run OCaml markdown bridge tests with converter binary
        env:
          FORESTER_PANDOC_PATH: ${{ steps.converter.outputs.path }}
          FORESTER_PANDOC_REQUIRE_BINARY: "1"
          FORESTER_RUST_PARSER_REQUIRE_BINARY: "1"
        run: ./scripts/test-markdown-bridge-ocaml.sh

  test:
    needs: changes
    if: needs.changes.outputs.test == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up shared CI toolchain
        uses: ./.github/actions/setup-ci

      - name: Build Rust parser binary for OCaml parity tests
        run: cargo build --manifest-path tools/rust-parser/Cargo.toml --release

      - name: Run combined parser-sync test checks
        env:
          FORESTER_RUST_PARSER_PATH: ${{ github.workspace }}/tools/rust-parser/target/release/forester-rust-parser
          FORESTER_RUST_PARSER_REQUIRE_BINARY: "1"
        run: just test
